name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cli:
    name: CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: cli/go.mod
          cache: false
      - name: Check formatting
        shell: bash
        run: |
          fmt_out="$(gofmt -l *.go)"
          if [ -n "$fmt_out" ]; then
            echo "$fmt_out"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  pi-extension:
    name: Pi extension
    runs-on: windows-latest
    defaults:
      run:
        working-directory: pi-hledit-diff
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: pi-hledit-diff/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Check
        run: npm run check
